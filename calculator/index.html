<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Calculator</title>
	<link rel="stylesheet" href="./style.css">
</head>
<body>
	<div class="calculator">
		<div class="calculator__display">
			<div class="display_expression">3&times;4</div>
			<div class="display__result">12</div>
		</div>
		<div class="calculator__keys">
			<button class="calculator__key">7</button>
			<button class="calculator__key">8</button>
			<button class="calculator__key">9</button>
			<button class="calculator__key key__delete">DEL</button>
			<button class="calculator__key key__clear">AC</button>
			<button class="calculator__key">4</button>
			<button class="calculator__key">5</button>
			<button class="calculator__key">6</button>
			<button class="calculator__key key__multiply">&times;</button>
			<button class="calculator__key key__divide">&divide;</button>
			<button class="calculator__key">1</button>
			<button class="calculator__key">2</button>
			<button class="calculator__key">3</button>
			<button class="calculator__key key__add">+</button>
			<button class="calculator__key key__subtract">-</button>
			<button class="calculator__key">0</button>
			<button class="calculator__key key__decimal">.</button>
			<button class="calculator__key">( )</button>
			<button class="calculator__key key__calculate">=</button>
		</div>
	</div>
	<script src="./main.js"></script>
</body>
</html>
